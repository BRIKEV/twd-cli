name: 'TWD CLI Run'
description: 'Run TWD browser tests with Puppeteer, including optional contract validation reporting'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  working-directory:
    description: 'Directory where twd.config.json lives'
    required: false
    default: '.'
  contract-report:
    description: 'Post contract validation report as a PR comment (requires pull-requests: write permission)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Cache Puppeteer browsers
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/puppeteer
        key: ${{ runner.os }}-puppeteer-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-puppeteer-

    - name: Install Chrome for Puppeteer
      shell: bash
      run: npx puppeteer browsers install chrome

    - name: Run TWD tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx twd-cli run

    - name: Post contract report to PR
      if: inputs.contract-report == 'true' && github.event_name == 'pull_request'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        REPORT_PATH=$(node -e "
          const fs = require('fs');
          try {
            const config = JSON.parse(fs.readFileSync('twd.config.json', 'utf-8'));
            if (config.contractReportPath) console.log(config.contractReportPath);
          } catch {}
        ")

        if [ -z "$REPORT_PATH" ] || [ ! -f "$REPORT_PATH" ]; then
          echo "No contract report found — skipping PR comment"
          exit 0
        fi

        echo "" >> "$REPORT_PATH"
        echo "[View full report →](${RUN_URL})" >> "$REPORT_PATH"

        if ! gh pr comment "${PR_NUMBER}" --body-file "$REPORT_PATH" 2>/dev/null; then
          echo "::warning::Could not post contract report to PR. Ensure the workflow has 'pull-requests: write' permission."
        fi
